<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PokeEvents GO</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e63946;
    --yellow: #ffd60a;
    --dark: #0a0a1a;
    --card: #12122a;
    --text: #f0f0ff;
    --muted: #8888aa;
    --green: #06d6a0;
    --orange: #fb8500;
    --purple: #9b5de5;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif; background:var(--dark); color:var(--text); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 20% 20%,rgba(230,57,70,.07) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(0,119,182,.07) 0%,transparent 50%); pointer-events:none; z-index:0; }

  header { background:linear-gradient(135deg,#c1121f 0%,#e63946 60%,#c1121f 100%); padding:16px 20px 12px; position:sticky; top:0; z-index:100; box-shadow:0 4px 30px rgba(230,57,70,.5); }
  .header-top { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .pokeball-svg { width:42px; height:42px; flex-shrink:0; filter:drop-shadow(0 2px 8px rgba(0,0,0,.4)); }
  header h1 { font-family:'Russo One',sans-serif; font-size:1.5rem; letter-spacing:3px; color:white; text-shadow:2px 2px 0 rgba(0,0,0,.3); flex:1; }
  .update-badge { font-size:0.68rem; color:rgba(255,255,255,.8); font-weight:700; background:rgba(0,0,0,.25); padding:4px 10px; border-radius:20px; }

  .header-pokemon { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; padding-bottom:2px; }
  .header-pokemon::-webkit-scrollbar { display:none; }
  .header-poke-chip { display:flex; align-items:center; gap:6px; background:rgba(0,0,0,.25); border-radius:30px; padding:4px 12px 4px 4px; flex-shrink:0; border:1px solid rgba(255,255,255,.15); }
  .header-poke-chip img { width:36px; height:36px; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,.4)); }
  .chip-name { font-size:0.72rem; font-weight:700; color:white; display:block; }
  .chip-label { font-size:0.58rem; color:rgba(255,255,255,.6); display:block; }

  .container { max-width:900px; margin:0 auto; padding:22px 16px; position:relative; z-index:1; }

  .ask-bar { background:var(--card); border:2px solid rgba(255,214,10,.25); border-radius:14px; padding:12px 16px; display:flex; gap:10px; margin-bottom:24px; }
  .ask-bar input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-family:'Outfit',sans-serif; font-size:.93rem; font-weight:600; }
  .ask-bar input::placeholder { color:var(--muted); }
  .ask-bar button { background:var(--yellow); color:#0a0a1a; border:none; border-radius:10px; padding:10px 16px; font-family:'Russo One',sans-serif; font-size:.82rem; letter-spacing:1px; cursor:pointer; transition:transform .1s,box-shadow .2s; white-space:nowrap; }
  .ask-bar button:hover { transform:scale(1.04); box-shadow:0 4px 20px rgba(255,214,10,.35); }
  .ask-bar button:active { transform:scale(.97); }

  .ai-response { background:var(--card); border-left:4px solid var(--yellow); border-radius:12px; padding:14px 18px; margin-bottom:22px; font-size:.92rem; line-height:1.7; display:none; }
  .ai-response.visible { display:block; animation:fadeIn .3s ease; }
  .ai-label { font-family:'Russo One',sans-serif; color:var(--yellow); font-size:.72rem; letter-spacing:2px; margin-bottom:8px; }

  .section-title { font-family:'Russo One',sans-serif; font-size:.95rem; letter-spacing:2px; color:var(--yellow); margin-bottom:12px; display:flex; align-items:center; gap:10px; text-transform:uppercase; }
  .section-title::after { content:''; flex:1; height:2px; background:linear-gradient(90deg,rgba(255,214,10,.3),transparent); }

  .raids-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:14px; margin-bottom:30px; }
  .raid-card { background:var(--card); border-radius:18px; overflow:hidden; border:1px solid rgba(255,255,255,.06); transition:transform .2s,box-shadow .2s; }
  .raid-card:hover { transform:translateY(-4px); box-shadow:0 12px 40px rgba(0,0,0,.4); }
  .raid-card-header { padding:16px; display:flex; align-items:center; gap:12px; }
  .raid-img-wrap { width:84px; height:84px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:rgba(255,255,255,.05); }
  .raid-img-wrap img { width:88px; height:88px; object-fit:contain; filter:drop-shadow(0 4px 12px rgba(0,0,0,.5)); }
  .raid-info { flex:1; }
  .stars { font-size:.68rem; color:var(--yellow); margin-bottom:4px; }
  .raid-name { font-family:'Russo One',sans-serif; font-size:1.05rem; letter-spacing:.5px; line-height:1.2; margin-bottom:6px; }
  .raid-type { display:flex; gap:5px; flex-wrap:wrap; }
  .type-badge { padding:2px 8px; border-radius:20px; font-size:.62rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; }
  .raid-dates { padding:10px 16px; background:rgba(0,0,0,.2); font-size:.76rem; color:var(--muted); display:flex; justify-content:space-between; align-items:center; gap:6px; }
  .shiny-badge { background:linear-gradient(135deg,#ffd700,#ff8c00); color:#000; padding:2px 8px; border-radius:20px; font-size:.62rem; font-weight:900; }
  .hot-badge { background:var(--red); color:white; padding:2px 8px; border-radius:20px; font-size:.62rem; font-weight:900; animation:pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.6} }
  .countdown { padding:10px 16px; background:rgba(0,0,0,.15); display:flex; align-items:center; gap:8px; font-size:.76rem; border-top:1px solid rgba(255,255,255,.04); }
  .countdown-bar { flex:1; height:4px; background:rgba(255,255,255,.1); border-radius:2px; overflow:hidden; }
  .countdown-fill { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--green),var(--yellow)); }
  .counter-chips { display:flex; gap:6px; flex-wrap:wrap; padding:10px 16px; background:rgba(0,0,0,.15); border-top:1px solid rgba(255,255,255,.04); }
  .counter-chip { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,.06); border-radius:20px; padding:3px 10px 3px 3px; font-size:.7rem; font-weight:700; }
  .counter-chip img { width:28px; height:28px; object-fit:contain; }

  .upcoming-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:10px; margin-bottom:30px; }
  .upcoming-card { background:var(--card); border-radius:14px; padding:14px 12px; text-align:center; border:1px solid rgba(255,255,255,.05); transition:transform .2s; }
  .upcoming-card:hover { transform:scale(1.03); }
  .upcoming-card img { width:70px; height:70px; object-fit:contain; filter:drop-shadow(0 4px 8px rgba(0,0,0,.5)); }
  .up-name { font-family:'Russo One',sans-serif; font-size:.78rem; margin-top:6px; }
  .up-dates { font-size:.65rem; color:var(--muted); margin-top:3px; }
  .up-region { font-size:.6rem; color:var(--orange); margin-top:2px; font-weight:700; }

  .events-list { display:flex; flex-direction:column; gap:10px; margin-bottom:30px; }
  .event-item { background:var(--card); border-radius:14px; padding:13px 16px; display:flex; gap:12px; align-items:center; border:1px solid rgba(255,255,255,.05); transition:transform .15s; position:relative; overflow:hidden; }
  .event-item::before { content:''; position:absolute; left:0;top:0;bottom:0; width:4px; }
  .event-item.community::before { background:var(--green); }
  .event-item.raid::before { background:var(--red); }
  .event-item.mega::before { background:var(--purple); }
  .event-item.special::before { background:var(--orange); }
  .event-item.max::before { background:#48cae4; }
  .event-item:hover { transform:translateX(4px); }
  .event-date { text-align:center; min-width:42px; }
  .event-day { font-family:'Russo One',sans-serif; font-size:1.4rem; color:var(--yellow); line-height:1; }
  .event-month { font-size:.58rem; text-transform:uppercase; color:var(--muted); letter-spacing:1px; font-weight:700; }
  .event-divider { width:1px; height:34px; background:rgba(255,255,255,.08); }
  .event-content { flex:1; }
  .event-tag { font-size:.58rem; font-weight:900; text-transform:uppercase; letter-spacing:1px; margin-bottom:3px; }
  .event-item.community .event-tag { color:var(--green); }
  .event-item.raid .event-tag { color:var(--red); }
  .event-item.special .event-tag { color:var(--orange); }
  .event-item.max .event-tag { color:#48cae4; }
  .event-item.mega .event-tag { color:var(--purple); }
  .event-title { font-weight:900; font-size:.92rem; }
  .event-desc { font-size:.72rem; color:var(--muted); margin-top:2px; }
  .event-pokemon-imgs { display:flex; }
  .event-pokemon-imgs img { width:44px; height:44px; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(0,0,0,.4)); margin-left:-8px; }
  .event-pokemon-imgs img:first-child { margin-left:0; }

  .max-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:12px; margin-bottom:30px; }
  .max-card { background:linear-gradient(135deg,#0d1b4b,#1a1a35); border:1px solid rgba(72,202,228,.2); border-radius:16px; padding:16px; text-align:center; transition:transform .2s; }

  .max-card img { width:80px; height:80px; object-fit:contain; filter:drop-shadow(0 0 12px rgba(72,202,228,.4)); }
  .max-name { font-family:'Russo One',sans-serif; font-size:.88rem; margin-top:8px; }
  .max-dates { font-size:.66rem; color:var(--muted); margin-top:4px; }

  .loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:24px;color:var(--muted);font-size:.85rem}
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  .refresh-btn{background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--muted);padding:6px 14px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:.76rem;cursor:pointer;transition:all .2s;margin-left:auto;display:block;margin-bottom:10px}
  .refresh-btn:hover{border-color:var(--yellow);color:var(--yellow)}

  footer{text-align:center;padding:22px;color:var(--muted);font-size:.7rem;border-top:1px solid rgba(255,255,255,.05);margin-top:14px}

  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;position:relative}
  .tz-wrapper{position:relative}

  .tz-btn:hover{background:rgba(0,0,0,.5)}

  { label:"🇲🇽 México (Centro)",    short:"México",     tz:"America/Mexico_City" },
  { label:"🇲🇽 México (Pacífico)",  short:"Mex. Pac.",  tz:"America/Tijuana" },
  { label:"🇺🇸 EE.UU. (Este)",      short:"EE.UU. ET",  tz:"America/New_York" },
  { label:"🇺🇸 EE.UU. (Centro)",    short:"EE.UU. CT",  tz:"America/Chicago" },
  { label:"🇺🇸 EE.UU. (Pacífico)", short:"EE.UU. PT",  tz:"America/Los_Angeles" },
  { label:"🇨🇴 Colombia",           short:"Colombia",   tz:"America/Bogota" },
  { label:"🇵🇪 Perú",               short:"Perú",       tz:"America/Lima" },
  { label:"🇪🇨 Ecuador",            short:"Ecuador",    tz:"America/Guayaquil" },
  { label:"🇻🇪 Venezuela",          short:"Venezuela",  tz:"America/Caracas" },
  { label:"🇧🇴 Bolivia",            short:"Bolivia",    tz:"America/La_Paz" },
  { label:"🇨🇱 Chile",              short:"Chile",      tz:"America/Santiago" },
  { label:"🇦🇷 Argentina",          short:"Argentina",  tz:"America/Argentina/Buenos_Aires" },
  { label:"🇺🇾 Uruguay",            short:"Uruguay",    tz:"America/Montevideo" },
  { label:"🇧🇷 Brasil",             short:"Brasil",     tz:"America/Sao_Paulo" },
  { label:"🇪🇸 España",             short:"España",     tz:"Europe/Madrid" },
];

let selectedTz = localStorage.getItem('pokeevents_tz') || 'America/Mexico_City';
let selectedTzShort = localStorage.getItem('pokeevents_tz_short') || 'México';

function buildTzDropdown() {
  document.getElementById('tz-dropdown').innerHTML = timezones.map(t =>
    `<button class="tz-option${t.tz===selectedTz?' active':''}" onclick="selectTimezone('${t.tz}','${t.short}','${t.label}')">${t.label}</button>`
  ).join('');
}

function toggleTzDropdown() {
  buildTzDropdown();
  document.getElementById('tz-dropdown').classList.toggle('open');
}

function selectTimezone(tz, short, label) {
  selectedTz = tz;
  selectedTzShort = short;
  localStorage.setItem('pokeevents_tz', tz);
  localStorage.setItem('pokeevents_tz_short', short);
  document.getElementById('tz-label').textContent = short;
  document.getElementById('tz-dropdown').classList.remove('open');
  updateTime();
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.tz-wrapper')) {
    const dd = document.getElementById('tz-dropdown');
    if (dd) dd.classList.remove('open');
  }
});

document.getElementById('tz-label').textContent = selectedTzShort;

function getImg(id) {
  // Use multiple CDN options
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/${id}.png`;
}
function onImgError(el, id) {
  const fallbacks = [
    `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`,
    `https://img.pokemondb.net/artwork/large/${getPokeName(id)}.jpg`,
  ];
  const step = parseInt(el.dataset.fallback||'0');
  if (step < fallbacks.length) {
    el.dataset.fallback = String(step+1);
    el.src = fallbacks[step];
  } else {
    el.style.display = 'none';
  }
}

  { name:"Regirock", id:377, dates:"20–26 abr (HOY)" },

const headerPokes = [
  {name:"Tapu Koko",id:785,label:"5★ ACTIVO"},
  {name:"Charizard G-Max",id:6,label:"GIGAMAX HOY"},
  {name:"Venusaur G-Max",id:3,label:"GIGAMAX HOY"},

  {name:"Gengar G-Max",id:94,label:"GIGAMAX HOY"},

function loadHeaderPokemon() {
  document.getElementById('header-pokemon').innerHTML = headerPokes.map(p => `
    <div class="header-poke-chip">
      ${pImg(p.id, p.name)}
      <div><span class="chip-name">${p.name}</span><span class="chip-label">${p.label}</span></div>
    </div>`).join('');
}

function loadRaids() {
  const grid = document.getElementById('raids-grid');
  grid.innerHTML = '';
  raids.forEach((r,i) => {
    const el = document.createElement('div');
    el.className = `raid-card card-anim ${r.bg}`;
    el.style.animationDelay = `${i*.1}s`;
    el.innerHTML = `
      <div class="raid-card-header">
        <div class="raid-img-wrap">${pImg(r.id, r.name)}</div>
        <div class="raid-info">
          <div class="stars">${r.stars}</div>
          <div class="raid-name">${r.name}</div>
          <div class="raid-type">${r.types.map(t=>`<span class="type-badge t-${t}">${t}</span>`).join('')}</div>
        </div>
      </div>
      <div class="raid-dates">
        <span>📅 ${r.dates}</span>
        <div style="display:flex;gap:5px">
          ${r.hot?'<span class="hot-badge">🔥 ACTIVO</span>':''}
          ${r.shiny?'<span class="shiny-badge">✨ SHINY</span>':''}
        </div>
      </div>
      <div class="countdown">
        <span style="font-size:.7rem;color:var(--muted)">Tiempo restante:</span>
        <div class="countdown-bar"><div class="countdown-fill" style="width:${r.progress}%"></div></div>
        <span style="font-size:.7rem;color:var(--muted)">${r.progress}%</span>
      </div>
      <div class="counter-chips">
        <span style="font-size:.66rem;color:var(--muted);align-self:center;margin-right:4px;font-weight:700">Counters:</span>
        ${r.counters.map(c=>`<div class="counter-chip">${pImg(c.id, c.name)}<span>${c.name}</span></div>`).join('')}
      </div>`;
    grid.appendChild(el);
  });
}

function loadUpcoming() {
  document.getElementById('upcoming-grid').innerHTML = upcoming.map((u,i) => `
    <div class="upcoming-card card-anim" style="animation-delay:${i*.07}s">
      ${pImg(u.id, u.name)}
      <div class="up-name">${u.name}</div>
      <div class="up-dates">📅 ${u.dates}</div>
      ${u.region?`<div class="up-region">${u.region}</div>`:''}
    </div>`).join('');
}

function loadEvents() {
  document.getElementById('events-list').innerHTML = events.map((ev,i) => `
    <div class="event-item ${ev.type} card-anim" style="animation-delay:${i*.07}s">
      <div class="event-date">
        <div class="event-day">${ev.day}</div>
        <div class="event-month">${ev.month}</div>
      </div>
      <div class="event-divider"></div>
      <div class="event-content">
        <div class="event-tag">${ev.tag}</div>
        <div class="event-title">${ev.title}</div>
        <div class="event-desc">${ev.desc}</div>
      </div>
      ${ev.pokemon.length?`<div class="event-pokemon-imgs">${ev.pokemon.slice(0,4).map(id=>pImg(id,'')).join('')}</div>`:''}
    </div>`).join('');
}

function loadMax() {
  document.getElementById('max-grid').innerHTML = maxBattles.map((mb,i) => `
    <div class="max-card card-anim" style="animation-delay:${i*.1}s">
      ${pImg(mb.id, mb.name)}
      <div class="max-name">${mb.name}</div>
      <div class="max-dates">💥 ${mb.dates}</div>
    </div>`).join('');
}


function updateTime() {
  const now = new Date();
  document.getElementById('last-update').textContent = now.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',timeZone:selectedTz});
}

loadHeaderPokemon();
loadRaids();
loadUpcoming();
loadEvents();
loadMax();
updateTime();
setInterval(updateTime,60000);
</script>
